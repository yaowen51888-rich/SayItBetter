<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>图标生成工具</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 12px;
    }
    h1 { margin: 0 0 24px 0; }
    .icons { display: flex; gap: 24px; margin: 24px 0; }
    .icon-wrapper { text-align: center; }
    canvas { border: 1px solid #ddd; border-radius: 8px; }
    .size-label { margin-top: 8px; font-weight: 500; }
    button {
      background: #0A0A0A;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 16px;
    }
    button:hover { background: #262626; }
    .instructions {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ SayItBetter 图标生成</h1>

    <div class="instructions">
      <strong>使用说明：</strong>
      <ol>
        <li>右键点击每个图标，选择"图片另存为..."</li>
        <li>分别保存为 icon16.png, icon48.png, icon128.png</li>
        <li>保存到 E:\play\idea\icons\ 目录</li>
      </ol>
    </div>

    <div class="icons">
      <div class="icon-wrapper">
        <canvas id="icon16" width="16" height="16"></canvas>
        <div class="size-label">16 x 16</div>
      </div>
      <div class="icon-wrapper">
        <canvas id="icon48" width="48" height="48"></canvas>
        <div class="size-label">48 x 48</div>
      </div>
      <div class="icon-wrapper">
        <canvas id="icon128" width="128" height="128"></canvas>
        <div class="size-label">128 x 128</div>
      </div>
    </div>

    <button onclick="generateIcons()">重新生成图标</button>
  </div>

  <script>
    function generateIcons() {
      [16, 48, 128].forEach(size => {
        const canvas = document.getElementById(`icon${size}`);
        const ctx = canvas.getContext('2d');

        // 白色背景（圆角）
        const radius = size * 0.22;
        ctx.fillStyle = '#FFFFFF';
        roundRect(ctx, 0, 0, size, size, radius);
        ctx.fill();

        // 黑色闪电
        ctx.fillStyle = '#0A0A0A';
        drawLightning(ctx, size);
      });
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawLightning(ctx, size) {
      const scale = size / 128;
      ctx.save();
      ctx.scale(scale, scale);

      ctx.beginPath();
      ctx.moveTo(72, 16);
      ctx.lineTo(48, 64);
      ctx.lineTo(64, 64);
      ctx.lineTo(56, 112);
      ctx.lineTo(88, 56);
      ctx.lineTo(68, 56);
      ctx.lineTo(80, 16);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    // 页面加载时生成
    generateIcons();
  </script>
</body>
</html>
